# ============================================================================
# GitHub Actions 自動化工作流程
# ============================================================================
# 功能：每天自動執行爬蟲，失敗站點每小時重試，每日最多 5 次
# 排程：UTC 00:00~04:00（台北 08:00~12:00）每小時一次
# 腳本內建智慧跳過：全部成功或超過 5 次時自動結束
# ============================================================================

name: 每日標案抓取

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = 台北 08:00（首次）
    - cron: '0 1 * * *'   # UTC 01:00 = 台北 09:00（重試 1）
    - cron: '0 2 * * *'   # UTC 02:00 = 台北 10:00（重試 2）
    - cron: '0 3 * * *'   # UTC 03:00 = 台北 11:00（重試 3）
    - cron: '0 4 * * *'   # UTC 04:00 = 台北 12:00（重試 4）

  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    name: 執行爬蟲
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: |
          python scraper/main.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data/ docs/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: $(TZ='Asia/Taipei' date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "Changes committed and pushed"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bid-data-${{ github.run_number }}
          path: |
            data/latest.csv
            docs/data.json
            docs/status.json
          retention-days: 30
