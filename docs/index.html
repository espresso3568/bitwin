<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid Dashboard | 三站標案即時看板</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0e14;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #238636;
            --accent-blue: #2f81f7;
            --accent-red: #f85149;
            --accent-orange: #d29922;
            --border-color: #30363d;
            --radius-sm: 6px;
            --radius-md: 10px;
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-tertiary: #f0f2f5;
            --text-primary: #1f2328;
            --text-secondary: #656d76;
            --accent-green: #1a7f37;
            --accent-blue: #0969da;
            --accent-red: #d1242f;
            --accent-orange: #9a6700;
            --border-color: #d0d7de;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .logo-group { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 32px; height: 32px; background: var(--accent-blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            display: flex; align-items: center; gap: 8px;
        }

        .banner {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .banner-info { display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .date-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 500;
        }

        .dropdown { position: relative; }
        .calendar-dropdown {
            position: absolute; top: 100%; right: 0; margin-top: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            padding: 16px; width: 280px; z-index: 1000;
            display: none;
        }
        .calendar-dropdown.show { display: block; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 12px; }
        .cal-day { padding: 8px; border-radius: 4px; color: var(--text-secondary); opacity: 0.5; }
        .cal-day.active { background: var(--accent-blue); color: white; opacity: 1; font-weight: bold; cursor: pointer; }
        .cal-day.has-data { color: var(--accent-blue); opacity: 1; font-weight: bold; cursor: pointer; text-decoration: underline; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card-link { text-decoration: none; color: inherit; display: block; transition: transform 0.2s ease; }
        .stat-card-link:hover { transform: translateY(-4px); }
        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 20px; border-radius: var(--radius-md);
            position: relative;
        }
        .stat-card::after { content: '↗'; position: absolute; top: 12px; right: 12px; font-size: 12px; opacity: 0; transition: opacity 0.2s; }
        .stat-card-link:hover .stat-card::after { opacity: 1; }
        .stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .table-container { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        th { background: var(--bg-tertiary); padding: 12px 16px; font-weight: 600; font-size: 12px; color: var(--text-secondary); }
        td { padding: 16px; border-bottom: 1px solid var(--border-color); }
        tr:last-child td { border-bottom: none; }

        .source-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .source-itri { background: rgba(47, 129, 247, 0.1); color: var(--accent-blue); }
        .source-iii { background: rgba(35, 134, 54, 0.1); color: var(--accent-green); }
        .source-sinica { background: rgba(210, 153, 34, 0.1); color: var(--accent-orange); }

        .tender-title { font-weight: 500; color: var(--text-primary); text-decoration: none; }
        .tender-title:hover { text-decoration: underline; color: var(--accent-blue); }
        .budget-text { font-family: 'JetBrains Mono', monospace; color: var(--accent-green); font-weight: 500; }
        .date-text { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); }

        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .status-active { background: rgba(35, 134, 54, 0.1); color: var(--accent-green); }
        .status-closed { background: rgba(248, 81, 73, 0.1); color: var(--accent-red); }

        .status-alert { margin-bottom: 24px; padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border-color); display: none; }
        .status-alert.show { display: block; }
        .status-alert-header { display: flex; justify-content: space-between; cursor: pointer; }
        .status-alert.collapsed .status-alert-body { display: none; }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-group">
                <div class="logo-icon">B</div>
                <h1>Bid Dashboard</h1>
            </div>
            <button class="theme-toggle" id="themeToggle">☀️ Light Mode</button>
        </header>

        <div class="status-alert alert-error collapsed" id="statusAlert">
            <div class="status-alert-header" id="statusAlertHeader"><strong>Scraper Status</strong> <div>▼</div></div>
            <div class="status-alert-body" id="statusAlertBody" style="margin-top:12px; font-size:13px;"></div>
        </div>

        <div class="banner">
            <div class="banner-info">
                <span>Currently Viewing: <strong id="currentDateLabel">最新公告 (近三日)</strong></span>
                <span id="updateTimeLabel" style="color: var(--text-secondary); font-size: 12px;"></span>
            </div>
            <div class="dropdown">
                <button class="date-btn" id="dateBtn">📅 選取日期</button>
                <div class="calendar-dropdown" id="calendarDropdown">
                    <div class="cal-header">
                        <button id="calPrev">◀</button>
                        <strong id="calMonthYear"></strong>
                        <button id="calNext">▶</button>
                    </div>
                    <div class="cal-grid" id="calGrid"></div>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="statTotal">0</div></div>
            <a href="https://vendor.itri.org.tw/broadBqry2.aspx" target="_blank" class="stat-card-link">
                <div class="stat-card"><div class="stat-label">ITRI</div><div class="stat-value" id="statItri" style="color: var(--accent-blue)">0</div></div>
            </a>
            <a href="https://bid.iii.org.tw/bid/list/bid_new_list.aspx" target="_blank" class="stat-card-link">
                <div class="stat-card"><div class="stat-label">III</div><div class="stat-value" id="statIii" style="color: var(--accent-green)">0</div></div>
            </a>
            <a href="https://srp.sinica.edu.tw/InviteBids" target="_blank" class="stat-card-link">
                <div class="stat-card"><div class="stat-label">Sinica</div><div class="stat-value" id="statSinica" style="color: var(--accent-orange)">0</div></div>
            </a>
        </div>

        <div class="table-container">
            <table>
                <thead><tr><th>來源</th><th>案號</th><th>標案名稱</th><th>預算</th><th>公告日</th><th>截止日</th><th>狀態</th></tr></thead>
                <tbody id="tenderBody">
                    <tr><td colspan="7" align="center" style="padding: 40px; color: var(--text-secondary);">Fetching tender data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let currentData = [];
        let manifestDates = [];
        const SOURCE_URLS = {'工研院': 'https://vendor.itri.org.tw/broadBqry2.aspx', '資策會': 'https://bid.iii.org.tw/bid/list/bid_new_list.aspx', '中研院': 'https://srp.sinica.edu.tw/InviteBids'};

        document.getElementById('themeToggle').addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeToggle').innerText = isDark ? '🌙 Dark Mode' : '☀️ Light Mode';
        });

        async function loadDashboard(date = 'latest') {
            const tbody = document.getElementById('tenderBody');
            const file = date === 'latest' ? 'data.json' : `data_${date.replace(/-/g, '')}.json`;
            try {
                const resp = await fetch(file);
                const json = await resp.json();
                currentData = json.data;
                document.getElementById('updateTimeLabel').innerText = `更新於: ${json.update_time}`;
                document.getElementById('currentDateLabel').innerText = (date === 'latest' ? '最新公告 (近三日)' : date);
                renderStats(json);
                renderTable(json.data);
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="7" align="center" style="padding: 40px; color: var(--accent-red);">無法載入資料</td></tr>`;
            }
        }

        function renderStats(json) {
            document.getElementById('statTotal').innerText = json.total || 0;
            document.getElementById('statItri').innerText = json.sources['工研院'] || 0;
            document.getElementById('statIii').innerText = json.sources['資策會'] || 0;
            document.getElementById('statSinica').innerText = json.sources['中研院'] || 0;
        }

        function renderTable(data) {
            const tbody = document.getElementById('tenderBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" align="center" style="padding: 40px;">目前無符合條件的標案</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(row => {
                const source = row['來源'] || '-';
                const badgeClass = source === '資策會' ? 'source-iii' : (source === '中研院' ? 'source-sinica' : 'source-itri');
                const budget = (row['預算金額'] && !isNaN(row['預算金額'])) ? '$' + parseFloat(row['預算金額']).toLocaleString() : (row['預算金額'] || '-');
                const status = row['狀態'] || '';
                const sClass = (status.includes('公告') || status === 'P' || status.includes('進行')) ? 'status-active' : (status.includes('結案') ? 'status-closed' : '');
                
                return `<tr>
                    <td><a href="${SOURCE_URLS[source] || '#'}" target="_blank" style="text-decoration:none"><span class="source-badge ${badgeClass}">${source}</span></a></td>
                    <td><code style="font-size:11px; opacity:0.7">${row['案號'] || '-'}</code></td>
                    <td><a href="${row['標題連結'] || '#'}" target="_blank" class="tender-title">${row['標題'] || '無標題'}</a></td>
                    <td><span class="budget-text">${budget}</span></td>
                    <td><span class="date-text">${row['公告日'] || '-'}</span></td>
                    <td><span class="date-text">${row['截止日'] || '-'}</span></td>
                    <td><span class="status-badge ${sClass}">${status === 'P' ? '公告中' : status}</span></td>
                </tr>`;
            }).join('');
        }

        let calMonth = new Date().getMonth();
        let calYear = new Date().getFullYear();

        async function initCalendar() {
            try {
                const resp = await fetch('dates.json');
                const json = await resp.json();
                manifestDates = json.dates;
                const sResp = await fetch('status.json');
                const sJson = await sResp.json();
                if (sJson.sources) {
                    const fails = Object.entries(sJson.sources).filter(([k,v]) => v.status === 'error');
                    if (fails.length > 0) {
                        const alert = document.getElementById('statusAlert');
                        alert.classList.add('show');
                        document.getElementById('statusAlertBody').innerHTML = fails.map(([k,v]) => `<div><strong>${k}</strong>: ${v.error}</div>`).join('');
                    }
                }
            } catch (e) {}
        }

        function renderCalendar() {
            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';
            document.getElementById('calMonthYear').innerText = `${calYear} / ${calMonth + 1}`;
            const firstDay = new Date(calYear, calMonth, 1).getDay();
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            const todayStr = new Date().getFullYear() + '-' + String(new Date().getMonth()+1).padStart(2,'0') + '-' + String(new Date().getDate()).padStart(2,'0');

            for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
            for(let i=1; i<=daysInMonth; i++) {
                const dStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const hasData = manifestDates.includes(dStr);
                const isToday = dStr === todayStr;
                const dayEl = document.createElement('div');
                dayEl.className = 'cal-day' + (hasData ? ' has-data' : '') + (isToday ? ' active' : '');
                dayEl.innerText = i;
                if(hasData || isToday) {
                    dayEl.onclick = () => { loadDashboard(isToday ? 'latest' : dStr); document.getElementById('calendarDropdown').classList.remove('show'); };
                }
                grid.appendChild(dayEl);
            }
        }

        document.getElementById('dateBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            const dd = document.getElementById('calendarDropdown');
            dd.classList.toggle('show');
            if(dd.classList.contains('show')) renderCalendar();
        });
        document.getElementById('calPrev').addEventListener('click', (e) => { e.stopPropagation(); calMonth--; if(calMonth<0){calMonth=11; calYear--;} renderCalendar(); });
        document.getElementById('calNext').addEventListener('click', (e) => { e.stopPropagation(); calMonth++; if(calMonth>11){calMonth=0; calYear++;} renderCalendar(); });
        document.getElementById('statusAlertHeader').addEventListener('click', () => document.getElementById('statusAlert').classList.toggle('collapsed'));
        document.addEventListener('click', (e) => { if(!document.getElementById('calendarDropdown').contains(e.target) && e.target.id !== 'dateBtn') document.getElementById('calendarDropdown').classList.remove('show'); });

        initCalendar();
        loadDashboard();
    </script>
</body>
</html>
